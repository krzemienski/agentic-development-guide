<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#1c1410"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="barAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(245,158,11,0.04)" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#fefce8" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="20" font-weight="700">Bug Detection: Single Agent vs 3-Agent Consensus</text>

  <!-- Y-axis baseline -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>

  <!-- Y-axis scale labels -->
  <text x="90" y="404" text-anchor="end" fill="rgba(254,252,232,0.25)" font-family="system-ui" font-size="11">0</text>
  <text x="90" y="324" text-anchor="end" fill="rgba(254,252,232,0.25)" font-family="system-ui" font-size="11">5</text>
  <text x="90" y="244" text-anchor="end" fill="rgba(254,252,232,0.25)" font-family="system-ui" font-size="11">10</text>
  <text x="90" y="164" text-anchor="end" fill="rgba(254,252,232,0.25)" font-family="system-ui" font-size="11">15</text>

  <!-- ================================================================ -->
  <!-- GROUP 1: Issues Found -->
  <!-- ================================================================ -->
  <text x="265" y="435" text-anchor="middle" fill="rgba(254,252,232,0.6)" font-family="system-ui" font-size="14" font-weight="600">Issues Found</text>

  <!-- Single agent: 12 issues found (bar height = 12/15 * 240 = 192) -->
  <rect x="210" y="208" width="50" height="192" rx="3" fill="url(#barRed)" opacity="0.85"/>
  <text x="235" y="198" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="16" font-weight="700">12</text>

  <!-- Multi agent: 15 issues found (bar height = 15/15 * 240 = 240) -->
  <rect x="270" y="160" width="50" height="240" rx="3" fill="url(#barGreen)" filter="url(#glow)"/>
  <text x="295" y="150" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="16" font-weight="700">15</text>

  <!-- ================================================================ -->
  <!-- GROUP 2: Critical Bugs Missed -->
  <!-- ================================================================ -->
  <text x="535" y="435" text-anchor="middle" fill="rgba(254,252,232,0.6)" font-family="system-ui" font-size="14" font-weight="600">Critical Bugs Missed</text>

  <!-- Single agent: 3 critical missed (bar height = 3/15 * 240 = 48) -->
  <rect x="480" y="352" width="50" height="48" rx="3" fill="url(#barRed)" opacity="0.85" filter="url(#glowRed)"/>
  <text x="505" y="342" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="16" font-weight="700">3</text>

  <!-- Multi agent: 0 critical missed (minimal bar for visibility) -->
  <rect x="540" y="397" width="50" height="3" rx="1.5" fill="url(#barGreen)" filter="url(#glow)"/>
  <text x="565" y="390" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="16" font-weight="700">0</text>

  <!-- ================================================================ -->
  <!-- Annotation: P2 bug callout on the missed-critical bar -->
  <!-- ================================================================ -->
  <g transform="translate(505, 340)">
    <line x1="0" y1="-4" x2="-80" y2="-60" stroke="rgba(239,68,68,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="-240" y="-82" width="164" height="30" rx="6" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
    <text x="-158" y="-63" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="11" font-weight="600">P2 streaming duplication</text>
  </g>

  <!-- Annotation: green callout on the 0 missed -->
  <g transform="translate(565, 378)">
    <line x1="0" y1="-4" x2="70" y2="-60" stroke="rgba(34,197,94,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="50" y="-82" width="120" height="30" rx="6" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="110" y="-63" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="11" font-weight="600">Zero missed</text>
  </g>

  <!-- ================================================================ -->
  <!-- Legend -->
  <!-- ================================================================ -->
  <rect x="240" y="470" width="14" height="14" rx="3" fill="url(#barRed)" opacity="0.85"/>
  <text x="260" y="482" fill="rgba(252,165,165,0.75)" font-family="system-ui" font-size="12" font-weight="500">1 Agent (single review)</text>

  <rect x="440" y="470" width="14" height="14" rx="3" fill="url(#barGreen)"/>
  <text x="460" y="482" fill="rgba(187,247,208,0.75)" font-family="system-ui" font-size="12" font-weight="500">3 Agents (consensus)</text>

  <!-- ================================================================ -->
  <!-- Summary line -->
  <!-- ================================================================ -->
  <line x1="100" y1="455" x2="700" y2="455" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <text x="400" y="465" text-anchor="middle" fill="rgba(254,252,232,0.25)" font-family="system-ui" font-size="11">1 agent: found 12 issues, missed 3 critical  |  3 agents: found 15 issues, 0 missed</text>
</svg>
