<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter Card - Multi-Agent Consensus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    width: 1200px;
    height: 628px;
    background: linear-gradient(155deg, #0c0a09 0%, #1c1410 40%, #0c0a09 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .content {
    display: flex;
    align-items: center;
    gap: 80px;
    position: relative;
    z-index: 2;
  }
  /* Left: P2 severity badge */
  .badge-area {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .p2-ring {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 3px solid rgba(239, 68, 68, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(circle, rgba(239, 68, 68, 0.06) 0%, transparent 70%);
  }
  .p2-ring::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(239, 68, 68, 0.12);
  }
  .p2-text {
    font-size: 96px;
    font-weight: 800;
    color: #ef4444;
    letter-spacing: -3px;
    text-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
  }
  .p2-label {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(252, 165, 165, 0.6);
    margin-top: 16px;
  }
  .p2-sublabel {
    font-size: 13px;
    color: rgba(252, 165, 165, 0.35);
    margin-top: 4px;
  }
  /* Right: Text content */
  .text-area {
    max-width: 540px;
  }
  .hook-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(245, 158, 11, 0.50);
    margin-bottom: 16px;
  }
  .title {
    font-size: 40px;
    font-weight: 700;
    color: #fefce8;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .title .amber {
    color: #f59e0b;
  }
  .detail {
    font-size: 16px;
    color: rgba(254, 252, 232, 0.40);
    margin-top: 20px;
    line-height: 1.5;
  }
  .code-ref {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 14px;
    color: rgba(245, 158, 11, 0.50);
    background: rgba(245, 158, 11, 0.06);
    border: 1px solid rgba(245, 158, 11, 0.12);
    border-radius: 6px;
    padding: 4px 10px;
    display: inline-block;
    margin-top: 16px;
  }
  /* Agent chips */
  .agents {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .agent-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.15);
    border-radius: 20px;
    padding: 5px 14px;
  }
  .agent-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f59e0b;
    box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
  }
  .agent-chip .name {
    font-size: 12px;
    font-weight: 600;
    color: rgba(253, 230, 138, 0.7);
    letter-spacing: 0.5px;
  }
  /* Bottom */
  .bottom {
    position: absolute;
    bottom: 28px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .author {
    font-size: 14px;
    color: rgba(245, 158, 11, 0.25);
    font-weight: 500;
  }
  /* Glow */
  .glow {
    position: absolute;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239, 68, 68, 0.07) 0%, transparent 70%);
    left: 100px;
    top: 50%;
    transform: translateY(-50%);
  }
  .glow-2 {
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
    right: 60px;
    top: 40px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="glow-2"></div>

  <div class="content">
    <div class="badge-area">
      <div class="p2-ring">
        <span class="p2-text">P2</span>
      </div>
      <div class="p2-label">Severity</div>
      <div class="p2-sublabel">Caught before shipping</div>
    </div>

    <div class="text-area">
      <div class="hook-label">Multi-Agent Consensus</div>
      <div class="title">
        <span class="amber">3 AI Agents</span> Found a Bug<br>
        I Would Have Shipped
      </div>
      <div class="detail">
        Single-agent review said "looks correct."<br>
        3-agent consensus caught it on the first pass.
      </div>
      <div class="code-ref">ChatViewModel.swift:926 &nbsp; += &rarr; =</div>
      <div class="agents">
        <div class="agent-chip"><span class="dot"></span><span class="name">Lead</span></div>
        <div class="agent-chip"><span class="dot"></span><span class="name">Alpha</span></div>
        <div class="agent-chip"><span class="dot"></span><span class="name">Bravo</span></div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <span class="author">Nick Krzemienski &middot; March 2026</span>
  </div>
</div>
</body>
</html>
