<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Card - Multi-Agent Consensus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    width: 1200px;
    height: 627px;
    background: linear-gradient(160deg, #0c0a09 0%, #1c1410 35%, #231a10 65%, #0c0a09 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  /* Glows */
  .glow-left {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    left: -80px;
    top: 50%;
    transform: translateY(-50%);
  }
  .glow-right {
    position: absolute;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, transparent 70%);
    right: -60px;
    bottom: -40px;
  }
  /* Top label */
  .top-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(245, 158, 11, 0.45);
    margin-bottom: 28px;
    position: relative;
    z-index: 2;
  }
  /* Title */
  .title {
    font-size: 42px;
    font-weight: 700;
    color: #fefce8;
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.5px;
    max-width: 800px;
    position: relative;
    z-index: 2;
  }
  .title .accent { color: #f59e0b; }
  /* Stats row */
  .stats-row {
    display: flex;
    gap: 60px;
    margin-top: 48px;
    position: relative;
    z-index: 2;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .stat + .stat::before {
    content: '';
    position: absolute;
    left: -30px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: rgba(245, 158, 11, 0.15);
  }
  .stat-number {
    font-size: 64px;
    font-weight: 800;
    color: #f59e0b;
    line-height: 1;
    letter-spacing: -2px;
    text-shadow: 0 0 30px rgba(245, 158, 11, 0.25);
  }
  .stat-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(254, 252, 232, 0.50);
    margin-top: 10px;
  }
  .stat-detail {
    font-size: 12px;
    color: rgba(254, 252, 232, 0.25);
    margin-top: 4px;
  }
  /* Bottom row */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 44px;
    position: relative;
    z-index: 2;
  }
  .result-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.2);
    border-radius: 8px;
    padding: 8px 20px;
  }
  .result-badge .check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #0c0a09;
    font-weight: 800;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
  }
  .result-badge .text {
    font-size: 14px;
    font-weight: 600;
    color: rgba(187, 247, 208, 0.7);
    letter-spacing: 0.5px;
  }
  .sep-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(245, 158, 11, 0.2);
  }
  .bug-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px;
    padding: 8px 20px;
  }
  .bug-badge .severity {
    font-size: 12px;
    font-weight: 700;
    color: #ef4444;
    letter-spacing: 1px;
  }
  .bug-badge .desc {
    font-size: 13px;
    color: rgba(252, 165, 165, 0.6);
  }
  /* Attribution */
  .attribution {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 14px;
    color: rgba(245, 158, 11, 0.25);
    font-weight: 500;
    z-index: 2;
  }
  /* Corner accents */
  .c { position: absolute; width: 40px; height: 40px; z-index: 2; }
  .c-tl { top: 20px; left: 20px; border-top: 1.5px solid rgba(245,158,11,0.15); border-left: 1.5px solid rgba(245,158,11,0.15); }
  .c-tr { top: 20px; right: 20px; border-top: 1.5px solid rgba(245,158,11,0.15); border-right: 1.5px solid rgba(245,158,11,0.15); }
  .c-bl { bottom: 20px; left: 20px; border-bottom: 1.5px solid rgba(245,158,11,0.15); border-left: 1.5px solid rgba(245,158,11,0.15); }
  .c-br { bottom: 20px; right: 20px; border-bottom: 1.5px solid rgba(245,158,11,0.15); border-right: 1.5px solid rgba(245,158,11,0.15); }
</style>
</head>
<body>
<div class="card">
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="c c-tl"></div>
  <div class="c c-tr"></div>
  <div class="c c-bl"></div>
  <div class="c c-br"></div>

  <div class="top-label">Multi-Agent Consensus Validation</div>

  <div class="title">
    How <span class="accent">3 AI Agents</span> Found a Bug<br>
    I Would Have Shipped
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-number">3</div>
      <div class="stat-label">Agents</div>
      <div class="stat-detail">Lead, Alpha, Bravo</div>
    </div>
    <div class="stat">
      <div class="stat-number">10</div>
      <div class="stat-label">Gates</div>
      <div class="stat-detail">Sequential phase audit</div>
    </div>
    <div class="stat">
      <div class="stat-number">0</div>
      <div class="stat-label">Bugs Shipped</div>
      <div class="stat-detail">All caught before release</div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="result-badge">
      <div class="check">&#10003;</div>
      <span class="text">3/3 Unanimous PASS Required</span>
    </div>
    <div class="sep-dot"></div>
    <div class="bug-badge">
      <span class="severity">P2</span>
      <span class="desc">Caught streaming duplication bug</span>
    </div>
  </div>

  <div class="attribution">Nick Krzemienski &middot; March 2026</div>
</div>
</body>
</html>
