<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#000000"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#0a0a0a" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="48" y="52" fill="#e050b0" font-size="22" font-weight="700" letter-spacing="0.05em">DESIGN SYSTEM</text>
  <text x="48" y="74" fill="#444444" font-size="12" letter-spacing="0.08em">AWESOME VIDEO DASHBOARD // CYBERPUNK</text>

  <!-- Divider -->
  <line x1="48" y1="92" x2="852" y2="92" stroke="#1a1a1a" stroke-width="1"/>

  <!-- COLOR PALETTE section -->
  <text x="48" y="130" fill="#666666" font-size="11" font-weight="600" letter-spacing="0.12em">COLOR PALETTE</text>

  <!-- Background swatch -->
  <rect x="48" y="148" width="120" height="80" fill="#000000" stroke="#333333" stroke-width="1"/>
  <text x="108" y="180" fill="#666666" font-size="10" text-anchor="middle">Background</text>
  <text x="108" y="198" fill="#a0a0a0" font-size="12" font-weight="600" text-anchor="middle">#000000</text>

  <!-- Hot Pink swatch -->
  <rect x="188" y="148" width="120" height="80" fill="#e050b0"/>
  <text x="248" y="180" fill="#000000" font-size="10" text-anchor="middle">Primary</text>
  <text x="248" y="198" fill="#000000" font-size="12" font-weight="600" text-anchor="middle">#e050b0</text>

  <!-- Cyan swatch -->
  <rect x="328" y="148" width="120" height="80" fill="#4dacde"/>
  <text x="388" y="180" fill="#000000" font-size="10" text-anchor="middle">Secondary</text>
  <text x="388" y="198" fill="#000000" font-size="12" font-weight="600" text-anchor="middle">#4dacde</text>

  <!-- Surface swatch -->
  <rect x="468" y="148" width="120" height="80" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="528" y="180" fill="#666666" font-size="10" text-anchor="middle">Surface</text>
  <text x="528" y="198" fill="#a0a0a0" font-size="12" font-weight="600" text-anchor="middle">#111111</text>

  <!-- Card swatch -->
  <rect x="608" y="148" width="120" height="80" fill="#1a1a1a" stroke="#222222" stroke-width="1"/>
  <text x="668" y="180" fill="#666666" font-size="10" text-anchor="middle">Card</text>
  <text x="668" y="198" fill="#a0a0a0" font-size="12" font-weight="600" text-anchor="middle">#1a1a1a</text>

  <!-- Text swatch -->
  <rect x="748" y="148" width="104" height="80" fill="#000000" stroke="#333333" stroke-width="1"/>
  <text x="800" y="172" fill="#ffffff" font-size="10" text-anchor="middle">Text Primary</text>
  <text x="800" y="190" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">#ffffff</text>
  <text x="800" y="210" fill="#a0a0a0" font-size="10" text-anchor="middle">#a0a0a0</text>
  <text x="800" y="222" fill="#666666" font-size="8" text-anchor="middle">secondary</text>

  <!-- TYPOGRAPHY section -->
  <text x="48" y="276" fill="#666666" font-size="11" font-weight="600" letter-spacing="0.12em">TYPOGRAPHY</text>

  <text x="48" y="308" fill="#ffffff" font-size="28" font-weight="700">JetBrains Mono</text>
  <text x="48" y="332" fill="#a0a0a0" font-size="14">ABCDEFGHIJKLMNOPQRSTUVWXYZ</text>
  <text x="48" y="352" fill="#a0a0a0" font-size="14">abcdefghijklmnopqrstuvwxyz 0123456789</text>

  <text x="540" y="304" fill="#666666" font-size="10" letter-spacing="0.08em">WEIGHTS</text>
  <text x="540" y="326" fill="#ffffff" font-size="14" font-weight="400">Regular 400</text>
  <text x="540" y="348" fill="#ffffff" font-size="14" font-weight="600">SemiBold 600</text>
  <text x="540" y="370" fill="#ffffff" font-size="14" font-weight="700">Bold 700</text>

  <!-- GEOMETRY section -->
  <text x="48" y="404" fill="#666666" font-size="11" font-weight="600" letter-spacing="0.12em">GEOMETRY</text>

  <!-- 0px radius demo -->
  <rect x="48" y="420" width="100" height="48" fill="none" stroke="#e050b0" stroke-width="2"/>
  <text x="98" y="448" fill="#e050b0" font-size="10" text-anchor="middle">0px radius</text>

  <!-- Comparison rounded (crossed out) -->
  <rect x="168" y="420" width="100" height="48" rx="12" ry="12" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="168" y1="420" x2="268" y2="468" stroke="#e050b0" stroke-width="1" opacity="0.5"/>
  <text x="218" y="448" fill="#333333" font-size="10" text-anchor="middle">12px radius</text>

  <!-- Sharp edges callout -->
  <text x="290" y="440" fill="#a0a0a0" font-size="11">All elements use sharp corners.</text>
  <text x="290" y="458" fill="#a0a0a0" font-size="11">No border-radius anywhere.</text>

  <!-- COMPONENT LIBRARY section -->
  <text x="540" y="404" fill="#666666" font-size="11" font-weight="600" letter-spacing="0.12em">COMPONENT LIBRARY</text>

  <!-- shadcn/ui badge -->
  <rect x="540" y="420" width="140" height="36" fill="#111111" stroke="#4dacde" stroke-width="1"/>
  <text x="610" y="443" fill="#4dacde" font-size="13" font-weight="600" text-anchor="middle">shadcn/ui</text>

  <!-- Tailwind badge -->
  <rect x="696" y="420" width="140" height="36" fill="#111111" stroke="#4dacde" stroke-width="1"/>
  <text x="766" y="443" fill="#4dacde" font-size="13" font-weight="600" text-anchor="middle">Tailwind CSS</text>

  <text x="540" y="478" fill="#444444" font-size="10">Next.js + React components</text>

  <!-- Bottom border accent -->
  <rect x="0" y="496" width="900" height="4" fill="url(#accentGrad)"/>
  <linearGradient id="accentGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#e050b0"/>
    <stop offset="50%" stop-color="#4dacde"/>
    <stop offset="100%" stop-color="#e050b0"/>
  </linearGradient>
</svg>
