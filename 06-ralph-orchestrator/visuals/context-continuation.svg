  <!-- Annotation: summarize drops -->
  <line x1="116" y1="95" x2="116" y2="160" stroke="rgba(251,191,36,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="284" y1="100" x2="284" y2="168" stroke="rgba(251,191,36,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="482" y1="120" x2="482" y2="182" stroke="rgba(251,191,36,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="680" y1="135" x2="680" y2="198" stroke="rgba(251,191,36,0.4)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Smart zone band -->
  <rect x="80" y="168" width="760" height="72" fill="rgba(139,92,246,0.05)" rx="2"/>
  <text x="865" y="200" text-anchor="start" fill="rgba(167,139,250,0.35)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9">SMART</text>
  <text x="865" y="212" text-anchor="start" fill="rgba(167,139,250,0.35)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9">ZONE</text>

  <!-- Legend -->
  <rect x="80" y="460" width="840" height="30" rx="4" fill="rgba(139,92,246,0.05)"/>
  <line x1="100" y1="475" x2="130" y2="475" stroke="#a78bfa" stroke-width="2"/>
  <text x="138" y="479" fill="rgba(196,181,253,0.6)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">Context usage (tokens)</text>
