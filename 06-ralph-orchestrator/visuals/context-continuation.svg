<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#13102a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(139,92,246,0.25)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="rgba(139,92,246,0.06)" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="400"/>
    <line x1="80" y1="400" x2="860" y2="400"/>
    <!-- Horizontal grid -->
    <line x1="80" y1="160" x2="860" y2="160" stroke-dasharray="4,8"/>
    <line x1="80" y1="240" x2="860" y2="240" stroke-dasharray="4,8"/>
    <line x1="80" y1="320" x2="860" y2="320" stroke-dasharray="4,8"/>
    <!-- Vertical grid - every ~5 continuations -->
    <line x1="175" y1="80" x2="175" y2="400" stroke-dasharray="4,8"/>
    <line x1="270" y1="80" x2="270" y2="400" stroke-dasharray="4,8"/>
    <line x1="365" y1="80" x2="365" y2="400" stroke-dasharray="4,8"/>
    <line x1="460" y1="80" x2="460" y2="400" stroke-dasharray="4,8"/>
    <line x1="555" y1="80" x2="555" y2="400" stroke-dasharray="4,8"/>
    <line x1="650" y1="80" x2="650" y2="400" stroke-dasharray="4,8"/>
    <line x1="745" y1="80" x2="745" y2="400" stroke-dasharray="4,8"/>
    <line x1="840" y1="80" x2="840" y2="400" stroke-dasharray="4,8"/>
  </g>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#e9e5f5" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600">Context Window Usage Across 41 Continuations</text>
  <text x="450" y="65" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">Longest sustained arc: fill up, summarize, continue</text>

  <!-- Y-axis labels -->
  <text x="72" y="84" text-anchor="end" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">176K</text>
  <text x="72" y="164" text-anchor="end" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">132K</text>
  <text x="72" y="244" text-anchor="end" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">88K</text>
  <text x="72" y="324" text-anchor="end" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">44K</text>
  <text x="72" y="404" text-anchor="end" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">0</text>

  <!-- Y-axis title -->
  <text x="20" y="240" text-anchor="middle" fill="rgba(167,139,250,0.4)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" transform="rotate(-90,20,240)">Tokens Used</text>

  <!-- X-axis labels -->
  <text x="80" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">1</text>
  <text x="175" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">5</text>
  <text x="270" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">10</text>
  <text x="365" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">15</text>
  <text x="460" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">20</text>
  <text x="555" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">25</text>
  <text x="650" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">30</text>
  <text x="745" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">35</text>
  <text x="840" y="420" text-anchor="middle" fill="rgba(167,139,250,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">41</text>

