<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <style>
      .card-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .card-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: rgba(255,255,255,0.55); }
      .card-icon { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 28px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#0d0f14"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#ffffff">9 Narrative Styles</text>
  <text x="450" y="64" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">One codebase, nine different stories</text>

  <!-- Row 1 -->
  <!-- Fiction -->
  <rect x="30" y="88" width="270" height="152" rx="10" fill="#1a1225" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="50" y="122" class="card-icon">&#128214;</text>
  <text x="82" y="122" class="card-title">Fiction</text>
  <text x="50" y="148" class="card-desc">Functions become characters.</text>
  <text x="50" y="166" class="card-desc">Data flows become journeys.</text>
  <text x="50" y="184" class="card-desc">Architecture as adventure.</text>
  <rect x="50" y="206" width="60" height="18" rx="9" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="80" y="219" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#a78bfa">Creative</text>

  <!-- Documentary -->
  <rect x="315" y="88" width="270" height="152" rx="10" fill="#1a2215" stroke="#22c55e" stroke-width="1.5"/>
  <text x="335" y="122" class="card-icon">&#127909;</text>
  <text x="367" y="122" class="card-title">Documentary</text>
  <text x="335" y="148" class="card-desc">Measured, authoritative tone.</text>
  <text x="335" y="166" class="card-desc">Code as a subject of study.</text>
  <text x="335" y="184" class="card-desc">Observational precision.</text>
  <rect x="335" y="206" width="76" height="18" rx="9" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="373" y="219" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#4ade80">Informative</text>

  <!-- Tutorial -->
  <rect x="600" y="88" width="270" height="152" rx="10" fill="#1a1d25" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="620" y="122" class="card-icon">&#128218;</text>
  <text x="652" y="122" class="card-title">Tutorial</text>
  <text x="620" y="148" class="card-desc">Step-by-step walkthrough.</text>
  <text x="620" y="166" class="card-desc">Building understanding layer</text>
  <text x="620" y="184" class="card-desc">by layer. Most thorough.</text>
  <rect x="620" y="206" width="76" height="18" rx="9" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="658" y="219" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#60a5fa">Educational</text>

  <!-- Row 2 -->
  <!-- Podcast -->
  <rect x="30" y="256" width="270" height="152" rx="10" fill="#251a18" stroke="#f97316" stroke-width="1.5"/>
  <text x="50" y="290" class="card-icon">&#127897;</text>
  <text x="82" y="290" class="card-title">Podcast</text>
  <text x="50" y="316" class="card-desc">Casual, conversational tone.</text>
  <text x="50" y="334" class="card-desc">Natural digressions and</text>
  <text x="50" y="352" class="card-desc">opinions. Most accessible.</text>
  <rect x="50" y="374" width="60" height="18" rx="9" fill="rgba(249,115,22,0.2)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
  <text x="80" y="387" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#fb923c">Casual</text>

  <!-- Technical -->
  <rect x="315" y="256" width="270" height="152" rx="10" fill="#151a22" stroke="#6b7280" stroke-width="1.5"/>
  <text x="335" y="290" class="card-icon">&#9881;</text>
  <text x="367" y="290" class="card-title">Technical</text>
  <text x="335" y="316" class="card-desc">Information-dense, precise.</text>
  <text x="335" y="334" class="card-desc">No metaphors. Systematic</text>
  <text x="335" y="352" class="card-desc">description. Facts only.</text>
  <rect x="335" y="374" width="60" height="18" rx="9" fill="rgba(107,114,128,0.2)" stroke="rgba(107,114,128,0.4)" stroke-width="1"/>
  <text x="365" y="387" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">Dense</text>

  <!-- Debate -->
  <rect x="600" y="256" width="270" height="152" rx="10" fill="#251a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="290" class="card-icon">&#9878;</text>
  <text x="652" y="290" class="card-title">Debate</text>
  <text x="620" y="316" class="card-desc">Two perspectives argue</text>
  <text x="620" y="334" class="card-desc">architecture decisions.</text>
  <text x="620" y="352" class="card-desc">Surfaces hidden tradeoffs.</text>
  <rect x="620" y="374" width="76" height="18" rx="9" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="658" y="387" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f87171">Adversarial</text>

  <!-- Row 3 -->
  <!-- Interview -->
  <rect x="30" y="424" width="270" height="152" rx="10" fill="#1a2225" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="50" y="458" class="card-icon">&#127908;</text>
  <text x="82" y="458" class="card-title">Interview</text>
  <text x="50" y="484" class="card-desc">Q&amp;A format. Interviewer</text>
  <text x="50" y="502" class="card-desc">asks, expert answers.</text>
  <text x="50" y="520" class="card-desc">Naturally handles "why."</text>
  <rect x="50" y="542" width="76" height="18" rx="9" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
  <text x="88" y="555" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22d3ee">Structured</text>

  <!-- Executive -->
  <rect x="315" y="424" width="270" height="152" rx="10" fill="#1f1a15" stroke="#eab308" stroke-width="1.5"/>
  <text x="335" y="458" class="card-icon">&#128188;</text>
  <text x="367" y="458" class="card-title">Executive</text>
  <text x="335" y="484" class="card-desc">High-level summary for</text>
  <text x="335" y="502" class="card-desc">technical leadership. Risk,</text>
  <text x="335" y="520" class="card-desc">scale, and team impact.</text>
  <rect x="335" y="542" width="68" height="18" rx="9" fill="rgba(234,179,8,0.2)" stroke="rgba(234,179,8,0.4)" stroke-width="1"/>
  <text x="369" y="555" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#facc15">Strategic</text>

  <!-- Storytelling -->
  <rect x="600" y="424" width="270" height="152" rx="10" fill="#201520" stroke="#ec4899" stroke-width="1.5"/>
  <text x="620" y="458" class="card-icon">&#10024;</text>
  <text x="652" y="458" class="card-title">Storytelling</text>
  <text x="620" y="484" class="card-desc">Warm, narrative-driven.</text>
  <text x="620" y="502" class="card-desc">Codebase in broader context.</text>
  <text x="620" y="520" class="card-desc">Code as human artifact.</text>
  <rect x="620" y="542" width="68" height="18" rx="9" fill="rgba(236,72,153,0.2)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
  <text x="654" y="555" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f472b6">Narrative</text>
</svg>
