<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Card - LinkedIn</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: #1a1207;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(217, 163, 47, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(217, 163, 47, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .bg-glow-left {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(217, 163, 47, 0.1) 0%, transparent 70%);
    top: 30%;
    left: -5%;
  }

  .bg-glow-right {
    position: absolute;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 189, 65, 0.07) 0%, transparent 70%);
    bottom: 10%;
    right: 5%;
  }

  .top-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    z-index: 2;
    padding-top: 40px;
  }

  .badge {
    display: inline-block;
    padding: 5px 18px;
    border: 1px solid rgba(217, 163, 47, 0.4);
    border-radius: 16px;
    color: #d9a32f;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    background: rgba(217, 163, 47, 0.08);
  }

  h1 {
    font-size: 46px;
    font-weight: 700;
    color: #f5f0e8;
    line-height: 1.15;
    text-align: center;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  h1 .highlight {
    background: linear-gradient(135deg, #f5bd41, #d9a32f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 17px;
    color: rgba(245, 240, 232, 0.5);
    text-align: center;
    max-width: 600px;
    line-height: 1.5;
  }

  .bottom-section {
    position: relative;
    z-index: 2;
    padding: 0 70px 50px;
  }

  .metrics-row {
    display: flex;
    justify-content: center;
    gap: 0;
  }

  .metric {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px;
    position: relative;
  }

  .metric:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 20%;
    height: 60%;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(217, 163, 47, 0.2), transparent);
  }

  .metric .value {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(180deg, #f5bd41, #d9a32f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .metric .label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(245, 240, 232, 0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .metric .detail {
    font-size: 11px;
    color: rgba(245, 240, 232, 0.3);
    margin-top: 4px;
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
  }

  .metrics-container {
    background: rgba(217, 163, 47, 0.05);
    border: 1px solid rgba(217, 163, 47, 0.15);
    border-radius: 16px;
    overflow: hidden;
  }

  .corner-decoration {
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: rgba(217, 163, 47, 0.12);
    border-style: solid;
  }
  .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
  .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow-left"></div>
  <div class="bg-glow-right"></div>
  <div class="corner-decoration corner-tl"></div>
  <div class="corner-decoration corner-br"></div>

  <div class="top-section">
    <div class="badge">AI Development Infrastructure</div>
    <h1>The <span class="highlight">Prompt Engineering</span> Stack</h1>
    <p class="subtitle">CLAUDE.md, Rules, Skills, and Hooks working as a layered enforcement system</p>
  </div>

  <div class="bottom-section">
    <div class="metrics-container">
      <div class="metrics-row">
        <div class="metric">
          <span class="value">150+</span>
          <span class="label">Skills</span>
          <span class="detail">composable workflows</span>
        </div>
        <div class="metric">
          <span class="value">9</span>
          <span class="label">Rules</span>
          <span class="detail">.claude/rules/*.md</span>
        </div>
        <div class="metric">
          <span class="value">7</span>
          <span class="label">Layers</span>
          <span class="detail">defense-in-depth</span>
        </div>
        <div class="metric">
          <span class="value">3</span>
          <span class="label">Tiers</span>
          <span class="detail">CLAUDE.md hierarchy</span>
        </div>
        <div class="metric">
          <span class="value">0</span>
          <span class="label">Mocks</span>
          <span class="detail">real systems only</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
