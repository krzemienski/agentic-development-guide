<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="20" font-weight="700">ChatView.swift — Modified in 9 of 15 Largest Sessions</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13">Estimated lines changed per session (relative scale)</text>

  <!-- Y Axis labels + horizontal bars -->
  <!-- Session 1: Ground-Up Rebuild -->
  <text x="210" y="105" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Ground-Up Rebuild</text>
  <rect x="220" y="90" width="480" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.95"/>
  <text x="710" y="107" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+580</text>

  <!-- Session 2: Alpha Spec -->
  <text x="210" y="149" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Alpha Spec</text>
  <rect x="220" y="134" width="410" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.90"/>
  <text x="640" y="151" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+495</text>

  <!-- Session 3: SSE Streaming Fix -->
  <text x="210" y="193" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">SSE Streaming Fix</text>
  <rect x="220" y="178" width="320" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.85"/>
  <text x="550" y="195" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+385</text>

  <!-- Session 4: E2E Chat SDK -->
  <text x="210" y="237" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">E2E Chat SDK</text>
  <rect x="220" y="222" width="290" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.80"/>
  <text x="520" y="239" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+350</text>

  <!-- Session 5: Comprehensive Audit -->
  <text x="210" y="281" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Comprehensive Audit</text>
  <rect x="220" y="266" width="250" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.75"/>
  <text x="480" y="283" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+302</text>

  <!-- Session 6: Text Duplication P2 -->
  <text x="210" y="325" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Text Duplication P2</text>
  <rect x="220" y="310" width="195" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.70"/>
  <text x="425" y="327" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+235</text>

  <!-- Session 7: Functional Depth -->
  <text x="210" y="369" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Functional Depth</text>
  <rect x="220" y="354" width="160" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.65"/>
  <text x="390" y="371" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+192</text>

  <!-- Session 8: Reflexion Gap -->
  <text x="210" y="413" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Reflexion Gap</text>
  <rect x="220" y="398" width="120" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.60"/>
  <text x="350" y="415" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+145</text>

  <!-- Session 9: HIG Font Compliance -->
  <text x="210" y="457" text-anchor="end" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">HIG Font Compliance</text>
  <rect x="220" y="442" width="85" height="24" rx="4" fill="url(#barGrad)" filter="url(#glow)" opacity="0.55"/>
  <text x="315" y="459" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="13" font-weight="700">+98</text>

  <!-- X Axis line -->
  <line x1="220" y1="478" x2="750" y2="478" stroke="#334155" stroke-width="1"/>
  <text x="220" y="494" fill="#475569" font-family="-apple-system, sans-serif" font-size="11">0</text>
  <text x="385" y="494" fill="#475569" font-family="-apple-system, sans-serif" font-size="11">200</text>
  <text x="550" y="494" fill="#475569" font-family="-apple-system, sans-serif" font-size="11">400</text>
  <text x="715" y="494" fill="#475569" font-family="-apple-system, sans-serif" font-size="11">600</text>
</svg>
