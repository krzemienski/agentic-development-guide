<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" fill="#0f172a" rx="12"/>

  <!-- Card 1: 763 Sessions -->
  <rect x="30" y="30" width="220" height="200" rx="16" fill="#1e293b" filter="url(#cardShadow)"/>
  <rect x="30" y="30" width="220" height="200" rx="16" fill="none" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="70" cy="72" r="20" fill="#22d3ee" fill-opacity="0.12"/>
  <text x="70" y="78" text-anchor="middle" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">&lt;/&gt;</text>
  <text x="140" y="130" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="52" font-weight="800">763</text>
  <text x="140" y="158" text-anchor="middle" fill="#64748b" font-family="-apple-system, sans-serif" font-size="14" font-weight="500">Claude Code Sessions</text>
  <rect x="90" y="180" width="100" height="3" rx="1.5" fill="#22d3ee" fill-opacity="0.4"/>

  <!-- Card 2: 202 Swift Files -->
  <rect x="275" y="30" width="220" height="200" rx="16" fill="#1e293b" filter="url(#cardShadow)"/>
  <rect x="275" y="30" width="220" height="200" rx="16" fill="none" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="315" cy="72" r="20" fill="#8b5cf6" fill-opacity="0.12"/>
  <text x="315" y="79" text-anchor="middle" fill="#8b5cf6" font-family="-apple-system, sans-serif" font-size="20" font-weight="700">S</text>
  <text x="385" y="130" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="52" font-weight="800">202</text>
  <text x="385" y="158" text-anchor="middle" fill="#64748b" font-family="-apple-system, sans-serif" font-size="14" font-weight="500">Swift Files (iOS)</text>
  <rect x="335" y="180" width="100" height="3" rx="1.5" fill="#8b5cf6" fill-opacity="0.4"/>

  <!-- Card 3: 470 Screenshots -->
  <rect x="520" y="30" width="220" height="200" rx="16" fill="#1e293b" filter="url(#cardShadow)"/>
  <rect x="520" y="30" width="220" height="200" rx="16" fill="none" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="560" cy="72" r="20" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="560" y="79" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, sans-serif" font-size="20" font-weight="700">&#x1F4F7;</text>
  <text x="630" y="130" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="52" font-weight="800">470</text>
  <text x="630" y="158" text-anchor="middle" fill="#64748b" font-family="-apple-system, sans-serif" font-size="14" font-weight="500">Screenshots (1 Session)</text>
  <rect x="580" y="180" width="100" height="3" rx="1.5" fill="#f59e0b" fill-opacity="0.4"/>

  <!-- Card 4: 46 Rebuild Tasks -->
  <rect x="765" y="30" width="220" height="200" rx="16" fill="#1e293b" filter="url(#cardShadow)"/>
  <rect x="765" y="30" width="220" height="200" rx="16" fill="none" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="805" cy="72" r="20" fill="#10b981" fill-opacity="0.12"/>
  <text x="805" y="79" text-anchor="middle" fill="#10b981" font-family="-apple-system, sans-serif" font-size="20" font-weight="700">&#x2713;</text>
  <text x="875" y="130" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="52" font-weight="800">46</text>
  <text x="875" y="158" text-anchor="middle" fill="#64748b" font-family="-apple-system, sans-serif" font-size="14" font-weight="500">Rebuild Tasks</text>
  <rect x="825" y="180" width="100" height="3" rx="1.5" fill="#10b981" fill-opacity="0.4"/>
</svg>
