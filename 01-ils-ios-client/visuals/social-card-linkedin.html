<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>LinkedIn Social Card — ILS iOS Client</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1200px;
    height: 627px;
    background: #0a0e1a;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 70px 90px;
  }

  /* Background gradient accents */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 80%, rgba(34, 211, 238, 0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
  }

  .category {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #22d3ee;
    margin-bottom: 20px;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    color: #f1f5f9;
    line-height: 1.15;
    margin-bottom: 16px;
    max-width: 700px;
  }

  .subtitle {
    font-size: 17px;
    color: #94a3b8;
    margin-bottom: 50px;
    max-width: 600px;
  }

  .stats-row {
    display: flex;
    gap: 40px;
    align-items: flex-end;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-value {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
  }

  .stat-label {
    font-size: 14px;
    font-weight: 500;
    color: #64748b;
    max-width: 140px;
    line-height: 1.3;
  }

  .stat:nth-child(1) .stat-value {
    background: linear-gradient(135deg, #22d3ee, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat:nth-child(2) .stat-value {
    background: linear-gradient(135deg, #f59e0b, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat:nth-child(3) .stat-value {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider {
    width: 1px;
    height: 70px;
    background: linear-gradient(to bottom, transparent, #334155, transparent);
  }

  /* Author bar at bottom */
  .author-bar {
    position: absolute;
    bottom: 30px;
    left: 90px;
    right: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1;
  }

  .author-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .author-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22d3ee, #6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #0a0e1a;
  }

  .author-name {
    font-size: 14px;
    font-weight: 600;
    color: #cbd5e1;
  }

  .author-date {
    font-size: 12px;
    color: #475569;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="category">Deep Dive</div>
    <div class="title">Building a Native iOS Client for Claude Code</div>
    <div class="subtitle">SwiftUI, Vapor, SSE streaming, and the war stories from shipping an AI-native mobile app.</div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">763</div>
        <div class="stat-label">Claude Code sessions</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-value">470</div>
        <div class="stat-label">screenshots in one session</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-value">9/15</div>
        <div class="stat-label">sessions touching ChatView.swift</div>
      </div>
    </div>
  </div>

  <div class="author-bar">
    <div class="author-info">
      <div class="author-avatar">NK</div>
      <div>
        <div class="author-name">Nick Krzemienski</div>
        <div class="author-date">March 2026</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
