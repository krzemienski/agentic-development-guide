<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Twitter Social Card - Agent SDK Bridge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
  }
  .container {
    width: 1200px;
    height: 628px;
    display: flex;
    position: relative;
    background:
      radial-gradient(ellipse 800px 500px at 35% 50%, rgba(220, 38, 38, 0.06) 0%, transparent 70%),
      linear-gradient(180deg, #0a0a0f 0%, #0f0f18 50%, #0a0a0f 100%);
  }
  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
  }
  .category {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #dc2626;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .category::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 2px;
    background: #dc2626;
  }
  .title {
    font-size: 42px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    color: #f0f0f5;
    margin-bottom: 20px;
    max-width: 540px;
  }
  .title em {
    font-style: normal;
    color: #dc2626;
  }
  .subtitle {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.5;
    color: #6b6b80;
    max-width: 480px;
  }
  .right-panel {
    width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border-left: 1px solid rgba(220, 38, 38, 0.1);
  }
  .metric {
    font-size: 200px;
    font-weight: 900;
    letter-spacing: -10px;
    color: #dc2626;
    line-height: 1;
    text-shadow: 0 0 100px rgba(220, 38, 38, 0.3);
  }
  .metric-label {
    font-size: 22px;
    font-weight: 600;
    color: #888;
    letter-spacing: 1px;
    margin-top: 8px;
  }
  .metric-sublabel {
    font-size: 14px;
    font-weight: 400;
    color: #555;
    margin-top: 6px;
  }
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #dc2626, transparent);
  }
</style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <div class="category">Architecture</div>
    <div class="title">The <em>5-Layer Bridge</em>: Connecting iOS to Claude Code</div>
    <div class="subtitle">4 failed attempts and the architecture of necessity that finally connected SwiftUI to Claude's API</div>
  </div>
  <div class="right-panel">
    <div class="metric">5</div>
    <div class="metric-label">layers deep</div>
    <div class="metric-sublabel">iOS to Anthropic API</div>
  </div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
