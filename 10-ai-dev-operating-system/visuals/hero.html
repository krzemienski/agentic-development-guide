<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<title>Hero - The AI Development Operating System</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;">
<div style="width:1200px;height:630px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;flex-direction:column;justify-content:center;padding:0 80px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;position:relative;overflow:hidden;">
  <!-- Grid overlay -->
  <div style="position:absolute;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(circle at 1px 1px,rgba(167,139,250,0.15) 1px,transparent 0);background-size:40px 40px;"></div>
  <!-- Glow top-right -->
  <div style="position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(167,139,250,0.2) 0%,transparent 70%);border-radius:50%;"></div>
  <!-- Glow bottom-left -->
  <div style="position:absolute;bottom:-150px;left:-50px;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 65%);border-radius:50%;"></div>
  <!-- Glow center-right -->
  <div style="position:absolute;top:40%;right:10%;width:300px;height:300px;background:radial-gradient(circle,rgba(167,139,250,0.08) 0%,transparent 70%);border-radius:50%;"></div>
  <!-- Corner accents -->
  <div style="position:absolute;top:24px;left:24px;width:30px;height:30px;border-top:2px solid rgba(167,139,250,0.3);border-left:2px solid rgba(167,139,250,0.3);"></div>
  <div style="position:absolute;top:24px;right:24px;width:30px;height:30px;border-top:2px solid rgba(99,102,241,0.25);border-right:2px solid rgba(99,102,241,0.25);"></div>
  <div style="position:absolute;bottom:24px;left:24px;width:30px;height:30px;border-bottom:2px solid rgba(99,102,241,0.25);border-left:2px solid rgba(99,102,241,0.25);"></div>
  <div style="position:absolute;bottom:24px;right:24px;width:30px;height:30px;border-bottom:2px solid rgba(167,139,250,0.3);border-right:2px solid rgba(167,139,250,0.3);"></div>

  <!-- Decorative agent nodes (background) -->
  <div style="position:absolute;top:60px;right:80px;z-index:1;opacity:0.5;">
    <div style="position:relative;width:320px;height:200px;">
      <!-- Node cluster representing agent network -->
      <div style="position:absolute;top:0;left:40px;width:10px;height:10px;border-radius:50%;background:#a78bfa;box-shadow:0 0 12px rgba(167,139,250,0.5);"></div>
      <div style="position:absolute;top:30px;left:120px;width:12px;height:12px;border-radius:50%;background:#6366f1;box-shadow:0 0 14px rgba(99,102,241,0.5);"></div>
      <div style="position:absolute;top:10px;left:200px;width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 10px rgba(34,211,238,0.5);"></div>
      <div style="position:absolute;top:70px;left:60px;width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 10px rgba(34,211,238,0.4);"></div>
      <div style="position:absolute;top:80px;left:160px;width:14px;height:14px;border-radius:50%;background:#a78bfa;box-shadow:0 0 16px rgba(167,139,250,0.4);"></div>
      <div style="position:absolute;top:50px;left:260px;width:10px;height:10px;border-radius:50%;background:#6366f1;box-shadow:0 0 12px rgba(99,102,241,0.4);"></div>
      <div style="position:absolute;top:120px;left:100px;width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 10px rgba(16,185,129,0.4);"></div>
      <div style="position:absolute;top:140px;left:220px;width:10px;height:10px;border-radius:50%;background:#22d3ee;box-shadow:0 0 12px rgba(34,211,238,0.4);"></div>
      <div style="position:absolute;top:160px;left:40px;width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow:0 0 12px rgba(16,185,129,0.4);"></div>
      <!-- Connecting lines -->
      <svg style="position:absolute;top:0;left:0;width:320px;height:200px;" xmlns="http://www.w3.org/2000/svg">
        <line x1="45" y1="5" x2="126" y2="36" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
        <line x1="126" y1="36" x2="204" y2="14" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
        <line x1="126" y1="36" x2="167" y2="87" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
        <line x1="65" y1="74" x2="167" y2="87" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
        <line x1="167" y1="87" x2="265" y2="55" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
        <line x1="167" y1="87" x2="105" y2="124" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
        <line x1="105" y1="124" x2="225" y2="145" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
        <line x1="105" y1="124" x2="45" y2="165" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div style="position:relative;z-index:2;">
    <!-- Category tag -->
    <div style="display:inline-block;padding:6px 16px;border:1px solid rgba(167,139,250,0.3);border-radius:20px;background:rgba(167,139,250,0.08);margin-bottom:24px;">
      <span style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#a78bfa;">Meta-Engineering</span>
    </div>

    <!-- Title -->
    <div style="font-size:50px;font-weight:800;line-height:1.12;color:#f1f5f9;margin-bottom:16px;max-width:750px;">
      Building an Operating System for AI Development
    </div>

    <!-- Subtitle -->
    <div style="font-size:18px;color:#94a3b8;margin-bottom:36px;max-width:650px;line-height:1.5;">
      4 composable systems, 25+ specialized agents, from idea to production across 8,481 sessions in 90 days.
    </div>

    <!-- System pills row -->
    <div style="display:flex;gap:14px;margin-bottom:36px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 18px;border-radius:10px;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);">
        <div style="width:8px;height:8px;border-radius:50%;background:#a78bfa;box-shadow:0 0 8px rgba(167,139,250,0.6);"></div>
        <span style="font-size:13px;font-weight:600;color:#c4b5fd;">OMC</span>
        <span style="font-size:11px;color:#7c7c9a;">Orchestration</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:8px 18px;border-radius:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);">
        <div style="width:8px;height:8px;border-radius:50%;background:#6366f1;box-shadow:0 0 8px rgba(99,102,241,0.6);"></div>
        <span style="font-size:13px;font-weight:600;color:#a5b4fc;">Ralph</span>
        <span style="font-size:11px;color:#7c7c9a;">Persistence</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:8px 18px;border-radius:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);">
        <div style="width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 8px rgba(34,211,238,0.6);"></div>
        <span style="font-size:13px;font-weight:600;color:#67e8f9;">Spec</span>
        <span style="font-size:11px;color:#7c7c9a;">Pipeline</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:8px 18px;border-radius:10px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);">
        <div style="width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.6);"></div>
        <span style="font-size:13px;font-weight:600;color:#6ee7b7;">GSD</span>
        <span style="font-size:11px;color:#7c7c9a;">Execution</span>
      </div>
    </div>

    <!-- Author -->
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;">
        <span style="font-size:18px;font-weight:700;color:#fff;">N</span>
      </div>
      <div>
        <div style="font-size:14px;font-weight:600;color:#e2e8f0;">Nick Krzemienski</div>
        <div style="font-size:12px;color:#64748b;">March 2026</div>
      </div>
    </div>
  </div>

  <!-- Bottom accent line -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#a78bfa,#6366f1,#22d3ee,#10b981);"></div>
</div>
</body>
</html>
