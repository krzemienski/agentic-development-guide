<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>LinkedIn Social Card</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 627px; overflow: hidden; background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }
.card { width: 1200px; height: 627px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.glow1 { position: absolute; width: 600px; height: 600px; top: -150px; left: 50%; transform: translateX(-50%); background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 60%); border-radius: 50%; }
.glow2 { position: absolute; width: 400px; height: 400px; bottom: -100px; left: 100px; background: radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 60%); border-radius: 50%; }
.glow3 { position: absolute; width: 400px; height: 400px; bottom: -100px; right: 100px; background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 60%); border-radius: 50%; }
.grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px); background-size: 50px 50px; }
.content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 80px; }
.category { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #22d3ee; margin-bottom: 20px; }
.title { font-size: 48px; font-weight: 800; line-height: 1.15; color: #f1f5f9; margin-bottom: 12px; max-width: 850px; }
.subtitle { font-size: 17px; color: #64748b; margin-bottom: 50px; }
.stats { display: flex; gap: 60px; }
.stat { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 24px 40px; border: 1px solid rgba(99,102,241,0.15); border-radius: 16px; background: rgba(99,102,241,0.04); }
.stat-value { font-size: 52px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, #6366f1 0%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: 14px; font-weight: 500; color: #94a3b8; letter-spacing: 0.5px; }
.border-accent { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #6366f1, #22d3ee, #6366f1); }
.corner-tl { position: absolute; top: 24px; left: 24px; width: 30px; height: 30px; border-top: 2px solid rgba(99,102,241,0.25); border-left: 2px solid rgba(99,102,241,0.25); }
.corner-tr { position: absolute; top: 24px; right: 24px; width: 30px; height: 30px; border-top: 2px solid rgba(34,211,238,0.2); border-right: 2px solid rgba(34,211,238,0.2); }
.corner-bl { position: absolute; bottom: 24px; left: 24px; width: 30px; height: 30px; border-bottom: 2px solid rgba(34,211,238,0.2); border-left: 2px solid rgba(34,211,238,0.2); }
.corner-br { position: absolute; bottom: 24px; right: 24px; width: 30px; height: 30px; border-bottom: 2px solid rgba(99,102,241,0.25); border-right: 2px solid rgba(99,102,241,0.25); }
</style>
</head>
<body>
<div class="card">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="grid"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>
  <div class="content">
    <div class="category">Meta-System Architecture</div>
    <div class="title">Building an OS for AI-Assisted Development</div>
    <div class="subtitle">OMC orchestration, Ralph Loop persistence, and spec-driven pipelines across 8,481 sessions</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">25+</div>
        <div class="stat-label">agent types</div>
      </div>
      <div class="stat">
        <div class="stat-value">150+</div>
        <div class="stat-label">skills</div>
      </div>
      <div class="stat">
        <div class="stat-value">97%</div>
        <div class="stat-label">context savings</div>
      </div>
    </div>
  </div>
  <div class="border-accent"></div>
</div>
</body>
</html>
