<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="barBefore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barAfter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowIndigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="16" fill="#0a0a0f" />

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100" />
    <line x1="0" y1="200" x2="900" y2="200" />
    <line x1="0" y1="300" x2="900" y2="300" />
    <line x1="0" y1="400" x2="900" y2="400" />
    <line x1="200" y1="0" x2="200" y2="500" />
    <line x1="400" y1="0" x2="400" y2="500" />
    <line x1="600" y1="0" x2="600" y2="500" />
    <line x1="800" y1="0" x2="800" y2="500" />
  </g>

  <!-- Title -->
  <text x="450" y="55" text-anchor="middle" fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="24" font-weight="700">Context Window Economics</text>
  <text x="450" y="82" text-anchor="middle" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="14">Semantic indexing via claude-mem compresses past research for reuse</text>

  <!-- Before bar -->
  <text x="80" y="175" text-anchor="end" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="16" font-weight="600">Before</text>
  <text x="80" y="197" text-anchor="end" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="12">Full re-read</text>
  <rect x="100" y="160" width="700" height="48" rx="8" fill="url(#barBefore)" filter="url(#glowIndigo)" opacity="0.9" />
  <text x="790" y="190" text-anchor="end" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="20" font-weight="700">653,000 tokens</text>

  <!-- After bar -->
  <text x="80" y="285" text-anchor="end" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="16" font-weight="600">After</text>
  <text x="80" y="307" text-anchor="end" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="12">Semantic index</text>
  <rect x="100" y="270" width="21" height="48" rx="8" fill="url(#barAfter)" filter="url(#glowCyan)" />
  <text x="135" y="300" text-anchor="start" fill="#22d3ee" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="20" font-weight="700">20,000 tokens</text>

  <!-- Reduction callout -->
  <rect x="300" y="355" width="300" height="90" rx="16" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.3" />
  <rect x="300" y="355" width="300" height="90" rx="16" fill="#22d3ee" opacity="0.05" />
  <text x="450" y="393" text-anchor="middle" fill="#22d3ee" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="42" font-weight="800" filter="url(#glowCyan)">97%</text>
  <text x="450" y="425" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="16" font-weight="500">token reduction</text>

  <!-- Arrow connecting bars -->
  <line x1="460" y1="218" x2="460" y2="260" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
  <polygon points="455,258 465,258 460,268" fill="#334155" />

  <!-- Bottom note -->
  <text x="450" y="478" text-anchor="middle" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Segoe UI, sans-serif" font-size="12">New sessions inherit institutional knowledge without paying full context cost</text>
</svg>
