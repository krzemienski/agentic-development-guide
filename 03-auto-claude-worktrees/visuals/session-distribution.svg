  <text x="40" y="64" fill="rgba(199,210,254,0.45)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="13" font-weight="500">Top 10 tasks ranked by total Claude sessions consumed</text>

  <!-- Grid lines -->
  <line x1="220" y1="88" x2="220" y2="480" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
