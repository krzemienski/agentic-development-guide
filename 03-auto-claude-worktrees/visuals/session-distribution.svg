  <line x1="468" y1="88" x2="468" y2="480" stroke="rgba(99,102,241,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="592" y1="88" x2="592" y2="480" stroke="rgba(99,102,241,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
