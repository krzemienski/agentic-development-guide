<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Banned Unit Tests from My AI Workflow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(180, 40, 40, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180, 40, 40, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180, 30, 30, 0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 1000px;
    padding: 0 60px;
  }
  .strike-badge {
    display: inline-block;
    background: rgba(180, 30, 30, 0.15);
    border: 1px solid rgba(180, 30, 30, 0.4);
    border-radius: 20px;
    padding: 6px 20px;
    margin-bottom: 28px;
    font-size: 14px;
    font-weight: 600;
    color: #c44040;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 54px;
    font-weight: 800;
    line-height: 1.15;
    color: #f0f0f5;
    margin-bottom: 24px;
    letter-spacing: -1px;
  }
  h1 .accent {
    color: #d43d3d;
    text-decoration: line-through;
    text-decoration-color: rgba(212, 61, 61, 0.6);
    text-decoration-thickness: 3px;
  }
  .subtitle {
    font-size: 20px;
    color: #8888a0;
    line-height: 1.5;
    max-width: 700px;
    margin: 0 auto 36px;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 48px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 36px;
    font-weight: 800;
    color: #d43d3d;
    letter-spacing: -0.5px;
  }
  .stat-label {
    font-size: 13px;
    color: #666680;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .corner-mark {
    position: absolute;
    bottom: 24px;
    right: 32px;
    font-size: 13px;
    color: #444460;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="content">
    <div class="strike-badge">Contrarian Take</div>
    <h1>I Banned <span class="accent">Unit Tests</span><br>from My AI Workflow</h1>
    <p class="subtitle">Functional validation with real UIs and real evidence replaced test theater across five production projects.</p>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">0</div>
        <div class="stat-label">Mock Files</div>
      </div>
      <div class="stat">
        <div class="stat-value">470</div>
        <div class="stat-label">Screenshots</div>
      </div>
      <div class="stat">
        <div class="stat-value">37+</div>
        <div class="stat-label">Validation Gates</div>
      </div>
    </div>
  </div>
  <div class="corner-mark">Functional Validation Series</div>
</body>
</html>
