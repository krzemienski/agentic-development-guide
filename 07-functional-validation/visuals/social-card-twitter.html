<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Card — Twitter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: #08080e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-pattern {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 50%, rgba(180, 30, 30, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(180, 30, 30, 0.05) 0%, transparent 50%);
  }
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 255, 255, 0.008) 2px,
      rgba(255, 255, 255, 0.008) 4px
    );
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 80px;
    padding: 0 80px;
  }
  .big-number {
    flex-shrink: 0;
    text-align: center;
  }
  .big-number .value {
    font-size: 220px;
    font-weight: 900;
    color: #d43d3d;
    line-height: 0.85;
    letter-spacing: -8px;
  }
  .big-number .label {
    font-size: 22px;
    font-weight: 600;
    color: #8888a0;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-top: 8px;
  }
  .divider {
    width: 2px;
    height: 300px;
    background: linear-gradient(to bottom, transparent, rgba(180, 30, 30, 0.3), transparent);
    flex-shrink: 0;
  }
  .text-side {
    flex: 1;
  }
  .tag {
    display: inline-block;
    background: rgba(180, 30, 30, 0.12);
    border: 1px solid rgba(180, 30, 30, 0.3);
    border-radius: 4px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    color: #c44040;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 42px;
    font-weight: 800;
    color: #f0f0f5;
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }
  h1 .strike {
    text-decoration: line-through;
    text-decoration-color: rgba(212, 61, 61, 0.5);
    text-decoration-thickness: 3px;
    color: #888898;
  }
  .desc {
    font-size: 18px;
    color: #6666780;
    line-height: 1.5;
    margin-bottom: 28px;
    color: #777790;
  }
  .stats-row {
    display: flex;
    gap: 32px;
  }
  .stat {
    text-align: left;
  }
  .stat-val {
    font-size: 28px;
    font-weight: 800;
    color: #d43d3d;
  }
  .stat-lbl {
    font-size: 11px;
    color: #555570;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .footer {
    position: absolute;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 13px;
    color: #333348;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="scanlines"></div>
  <div class="content">
    <div class="big-number">
      <div class="value">0</div>
      <div class="label">Mock Files</div>
    </div>
    <div class="divider"></div>
    <div class="text-side">
      <div class="tag">Across 5 Projects</div>
      <h1>I Replaced <span class="strike">Unit Tests</span> with Screenshots</h1>
      <p class="desc">Functional validation through real UIs caught more bugs than any test suite.</p>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val">470</div>
          <div class="stat-lbl">Screenshots</div>
        </div>
        <div class="stat">
          <div class="stat-val">37+</div>
          <div class="stat-lbl">Gates</div>
        </div>
        <div class="stat">
          <div class="stat-val">3</div>
          <div class="stat-lbl">Browser Tools</div>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">Functional Validation Series</div>
</body>
</html>
